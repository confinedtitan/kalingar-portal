<VirtualHost *:80>
 ServerName sreeramalakshmi.edainfront.in
 DocumentRoot /var/www/kalinger_portal/trust-frontend 
 ServerAdmin sraguram@yahoo.com
 <Directory /var/www/kalinger_portal/trust-frontend>
        Options +FollowSymLinks
        AllowOverride All
        Require all granted
    </Directory>
ErrorLog ${APACHE_LOG_DIR}/error.log
CustomLog ${APACHE_LOG_DIR}/access.log combined

RewriteEngine on
RewriteCond %{SERVER_NAME} =sreeramalakshmi.edainfront.in
RewriteRule ^ https://%{SERVER_NAME}%{REQUEST_URI} [END,NE,R=permanent]
</VirtualHost>


