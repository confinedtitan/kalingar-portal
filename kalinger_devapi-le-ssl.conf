<IfModule mod_ssl.c>
<VirtualHost *:443>
    ServerName sreeramalakshmi-api.edainfront.in
    ServerAdmin sraguram@yahoo.com
    DocumentRoot /var/www/kalinger_portal/trust-backend 

    Alias /static /var/www/kalinger_portal/trust-backend/static
    <Directory /var/www/kalinger_portal/trust-backend/static>
        Require all granted
    </Directory>

    Alias /media /var/www/kalinger_portal/trust-backend/media

	<Directory /var/www/kalinger_portal/trust-backend/media>
    		Require all granted

    		#Header set Access-Control-Allow-Origin "*"
    		#Header set Access-Control-Allow-Methods "GET, OPTIONS"
    		#Header set Access-Control-Allow-Headers "*"
	</Directory>

    ProxyPreserveHost On

    #RequestHeader set X-Forwarded-Proto "https"
    #RequestHeader set X-Forwarded-Port "443"

    ProxyPass /api http://127.0.0.1:8000/api
    ProxyPassReverse /api http://127.0.0.1:8000/api

    ProxyPass /admin http://127.0.0.1:8000/admin
    ProxyPassReverse /admin http://127.0.0.1:8000/admin
    #<Directory /var/www/talchi_dev/talchi_dev>
    #  <Files wsgi.py>
    #        Require all granted
    #  </Files>
    #</Directory>
    #WSGIDaemonProcess itconnectus-api.talchi.ai python-home=/var/www/venv python-path=/var/www/talchi_itconnect_sg

    ##WSGIProcessGroup dev-api.talchi.ai
    ##WSGIScriptAlias / /var/www/talchi_dev/talchi_dev/wsgi.py
    ##WSGIPassAuthorization On
   
    ErrorLog ${APACHE_LOG_DIR}/error.log
    CustomLog ${APACHE_LOG_DIR}/access.log combined

    #RewriteEngine On
    #RewriteCond %{HTTPS} off
    #RewriteRule ^ https://%{HTTP_HOST}%{REQUEST_URI} [L,R=301]


</VirtualHost>
</IfModule>
